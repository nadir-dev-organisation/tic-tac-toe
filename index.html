<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <script defer src="game.js"></script>
  <script defer src="ui.js"></script>
  <title>Tic Tac Toe</title>
</head>
<body>
  <main class="main-content">
    <h1 class="title">Tic Tac Toe</h1>
    <div class="game-setup-container">
      <div class="card-container">
        <div class="card-player left-card">
          <div class="card-top">
            <button class="player-mark cross-mark" type="button">X</button>
          </div>
          <div class="card-avatar">
            <img src="img/player.gif" alt="Player image" class="avatar">
          </div>
          <div class="card-bottom">
            <button class="player-name is-selected" type=button>Player</button>
            <button class="bot-difficulty" type=button>Bot</button>
          </div>
        </div>
        <div class="versus-area">
          <p class="versus">VS</p>
          <button class="start-game is-hidden">Start Game</button>
        </div>
        <div class="card-player right-card">
          <div class="card-top">
            <button class="player-mark nought-mark" type="button">O</button>
          </div>
          <div class="card-avatar">
            <img src="img/bot.gif" alt="Player image" class="avatar">
          </div>
          <div class="card-bottom">
            <button class="player-name" type=button>Player</button>
            <button class="bot-difficulty is-selected" type=button>Bot</button>
          </div>
        </div>
      </div>

    </div>

    <div class="game-area is-rendered">
      <div class="game-container is-rendered">
        <div class="card-player left-card">
          <div class="card-top">
            <span class="game-player-name">Player</span>
            <span class="game-player-mark">X</span>
          </div>
          <div class="card-avatar">
            <img src="img/player.gif" alt="Player image" class="avatar">
          </div>
          <div class="card-bottom">
            <span class="player-score-title">Score</span>
            <span class="player-score-number">0</span>
          </div>
        </div>
        <div class="board-panel">
          <div class="turn-badge">
            <span class="turn-marker"></span>
            <span class="turn-text">Your turn</span>
          </div>
          <div class="board-container"></div>
        </div>
        <div class="card-player right-card">
          <div class="card-top">
            <span class="game-player-name">Player</span>
            <span class="game-player-mark">O</span>
          </div>
          <div class="card-avatar">
            <img src="img/bot.gif" alt="Player image" class="avatar">
          </div>
          <div class="card-bottom">
            <span class="player-score-title">Score</span>
            <span class="player-score-number">0</span>
          </div>
        </div>

      </div>

      <div class="game-controls-container">
        <div class="game-controls">
          <button class="control-button back-button" type="button">Back</button>
          <span class="separator"></span>
          <div class="round-display">
            <span class="round-title">Round</span>
            <span class="round-number"></span>
          </div>
          <span class="separator"></span>
          <button class="control-button reset-score-button" type="button">
            Reset Score
          </button>
        </div>
      </div>


    </div>
  </main>
  
</body>
</html>
